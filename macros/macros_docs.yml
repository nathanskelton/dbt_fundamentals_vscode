macros:
  - name: cents_to_dollars
    description: "Convert an amount in cents to dollars, with a specified number of decimal places (default is 2)"
    arguments:
      - name: column_name
        description: "The name of the column containing the amount in cents"
        type: string
      - name: decimals
        description: "The number of decimal places to round the result to (default is 2)"
        type: integer
  - name: grant_select
    description: "Grant SELECT permissions on a specified schema to a specified role"
    arguments:
      - name: schema
        description: "The name of the schema to grant permissions on"
        type: string
      - name: role
        description: "The name of the role to grant permissions to"
        type: string